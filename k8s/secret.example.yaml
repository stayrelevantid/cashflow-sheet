apiVersion: v1
kind: Secret
metadata:
  name: cashflow-secret
type: Opaque
stringData:
  GOOGLE_SHEET_ID: "your_sheet_id_here"
  GOOGLE_SERVICE_ACCOUNT_EMAIL: "your_sa_email_here"
  # Note: Use the literal newline-formatted key here (do not enclose in quotes if using the | block scalar)
  GOOGLE_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    YOUR_ACTUAL_BASE64_KEY_HERE
    -----END PRIVATE KEY-----
  GOOGLE_SHEET_TAB_NAME: "Transactions"
